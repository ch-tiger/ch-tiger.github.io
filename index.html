<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch-tiger's Blog</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: rgba(0, 0, 0, 0.2) url('src/fabian-wiktor-994605.jpg') center/cover no-repeat fixed; /* 用你的图片路径

替换 'your-background-image.jpg' */
            background-color: #f8f8f8;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2e6c87;
            color: #fff;
            text-align: center;
            padding: 15px;
        }

        nav {
            background-color: #555;
            padding: 5px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            padding: 10px;
            margin: 0 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #777;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            max-width: 1200px;
            margin: 5px auto;
        }

        .main-content {
            flex: 3;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar {
            flex: 0.5;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-left: 2px;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Ch-tiger's Blog</h1>
        <!-- Audio Section -->
            <div class="audio-section">
                <audio id="myAudio" controls autoplay>
                    <source src="src/island-beat-250.mp3" type="audio/mp3"> <!-- 替换 'your-audio.mp3' 为你的音频文件路径 -->

                </audio>
                <!-- <button onclick="toggleMute()">Toggle</button> -->
            </div>
            <!-- End Audio Section -->
    </header>

    <nav>

        <a href="#">Life</a>
